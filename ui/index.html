<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PULSE</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #d9dde4;
      --line-strong: #bfc6d1;
      --primary: #111111;
      --secondary-fill: #9ca3af;
      --ok: #059669;
      --danger: #dc2626;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      font-family: "SF Pro Display", "SF Pro Text", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    body {
      padding: 0;
      overflow: hidden;
    }

    .shell {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .hero {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    /* Specific override: main.shell > header.hero */
    main.shell > header.hero {
      padding-left: 14px;
      padding-right: 14px;
    }

    .title {
      margin: 0;
      font-size: 28px;
      letter-spacing: -0.02em;
      font-weight: 700;
      display: inline-flex;
      align-items: baseline;
      gap: 8px;
      white-space: nowrap;
    }

    .brand-acronym {
      display: inline-block;
    }

    .brand-expansion {
      display: inline-block;
      max-width: 0;
      opacity: 0;
      overflow: hidden;
      white-space: nowrap;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0;
      transition: max-width 0.22s ease, opacity 0.18s ease;
    }

    .hero:hover .brand-expansion {
      max-width: 520px;
      opacity: 1;
    }

    .api-limit-indicator {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      text-align: right;
    }

    .subtitle {
      display: none;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      flex: 1;
      min-height: 0;
      align-items: stretch;
      overflow: hidden;
    }

    .left-column {
      display: flex;
      flex-direction: column;
      width: 320px;
      border-right: 1px solid var(--line);
      min-height: 0;
      overflow: hidden;
    }

    .left-column > section.panel:first-child {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    .left-column > section.panel:first-child .panel-body {
      flex: 1;
      min-height: 0;
    }

    .left-column > section.panel:first-child .list {
      height: 100%;
      max-height: none;
    }

    /* Past panel consumes remaining height after Next Query + Query Criteria */
    #upcomingPanel,
    #criteriaPanel {
      flex: 0 0 auto;
    }

    .panel {
      background: #fff;
      border-bottom: 1px solid var(--line);
    }

    /* Remove section underlines for the four main panels */
    .left-column > section.panel:first-child,
    #upcomingPanel,
    #criteriaPanel,
    .result-panel {
      border-bottom: 0;
    }

    #upcomingPanel,
    #criteriaPanel {
      border-top: 1px solid var(--line);
    }

    .left-column > section.panel:first-child > .panel-header,
    #upcomingPanel > .panel-header,
    #criteriaPanel > .panel-header,
    .result-panel > .panel-header {
      border-bottom: 0;
    }

    .left-column .panel:last-child {
      border-bottom: 0;
    }

    .panel.is-panel-collapsed {
      border-bottom: 0;
    }

    .result-panel {
      border-bottom: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--line);
      padding: 10px 12px;
    }

    .panel-header.collapsible-header {
      cursor: pointer;
    }

    .panel-header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-action-btn {
      border: 0;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }

    .header-action-btn:hover {
      color: var(--text);
    }

    .panel-title {
      margin: 0;
      font-size: 14px;
      font-weight: 600;
    }

    .panel-sub {
      font-size: 11px;
      color: var(--muted);
    }

    .collapse-btn {
      width: 20px;
      height: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      line-height: 1;
      padding: 0;
      cursor: pointer;
    }

    .collapse-btn:hover {
      color: var(--text);
    }

    .collapse-btn .collapse-icon {
      width: 14px;
      height: 14px;
      transition: transform 0.12s ease;
      transform: rotate(0deg);
    }

    .collapse-btn[aria-expanded="false"] .collapse-icon {
      transform: rotate(-90deg);
    }

    .panel-body {
      padding: 10px;
    }

    /* Element 1: Past Queries header */
    main.shell > section.layout > aside.left-column > section.panel:first-child > div.panel-header {
      padding-left: 14px;
      padding-right: 14px;
      padding-top: 10px;
      padding-bottom: 4px;
    }

    /* Element 2: Past Queries body */
    main.shell > section.layout > aside.left-column > section.panel:first-child > div.panel-body {
      padding-top: 12px;
      padding-bottom: 12px;
    }

    /* Element 3: Next Query header */
    section#upcomingPanel > div.panel-header {
      padding-left: 14px;
      padding-right: 14px;
      padding-top: 6px;
      padding-bottom: 6px;
    }

    /* Element 4: Query Criteria header */
    section#criteriaPanel > div.panel-header {
      padding-left: 14px;
      padding-right: 14px;
      padding-top: 6px;
      padding-bottom: 6px;
    }

    /* Element 5: Query Criteria body */
    div#criteriaBody {
      padding-left: 14px;
      padding-right: 14px;
      padding-top: 14px;
      padding-bottom: 14px;
    }

    /* Specific override: Upcoming body left/right padding */
    div#upcomingBody {
      padding-left: 14px;
      padding-right: 14px;
    }

    /* Element 6: Results panel body */
    main.shell > section.layout > section.panel > div.panel-body {
      padding-left: 14px;
      padding-right: 14px;
    }

    /* Element 7: Results panel header */
    main.shell > section.layout > section.panel > div.panel-header {
      padding-left: 14px;
      padding-right: 14px;
      padding-top: 10px;
      padding-bottom: 4px;
    }

    .list {
      overflow: auto;
      padding-right: 2px;
    }

    .query-item {
      border-bottom: 0;
      padding: 7px 4px 7px 4px;
      background: #fff;
      cursor: pointer;
      transition: background-color 0.12s ease;
      position: relative;
      border-radius: 4px;
      margin-bottom: 4px;
    }

    .query-item::after {
      content: "";
      position: absolute;
      right: 0;
      top: 0;
      width: 38px;
      height: 100%;
      opacity: 0;
      pointer-events: none;
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      background: rgba(255, 255, 255, 0.72);
      transition: opacity 0.12s ease;
      border-top-right-radius: 4px;
      border-bottom-right-radius: 4px;
      z-index: 1;
    }

    .query-item:hover::after,
    .query-item:focus-within::after {
      opacity: 1;
    }

    .query-item.selected {
      background: #f3f4f6;
    }

    .query-item:hover {
      background: #f8f8f8;
    }

    .query-item.selected .query-meta {
      color: #111111;
      font-weight: 600;
    }

    .query-item.selected .chip {
      color: #111111;
    }

    .delete-past-btn {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      border: 0;
      background: transparent;
      color: var(--muted);
      width: 16px;
      height: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 2px;
      cursor: pointer;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.12s ease;
      z-index: 2;
    }

    #pastList .query-item:hover .delete-past-btn,
    #pastList .query-item:focus-within .delete-past-btn {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .delete-past-btn:hover {
      color: var(--danger);
    }

    .delete-past-btn .trash-icon {
      width: 14px;
      height: 14px;
    }

    .next-query-wrap {
      display: grid;
      gap: 8px;
    }

    .next-query-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--muted);
      padding-bottom: 0;
    }

    .next-query-time {
      color: var(--text);
      font-weight: 600;
    }

    .next-query-control {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .next-query-spacer {
      margin-left: auto;
      width: 1px;
      height: 1px;
    }

    .next-query-label {
      margin: 0;
      font-size: 12px;
      color: var(--muted);
      font-weight: 400;
      white-space: nowrap;
    }

    .next-query-input {
      width: 56px;
      appearance: textfield;
      -moz-appearance: textfield;
    }

    .next-query-input::-webkit-outer-spin-button,
    .next-query-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .inline-apply {
      width: auto;
      min-width: 0;
      padding: 0;
      margin-top: 0;
    }

    .text-btn {
      border: 0;
      background: transparent;
      color: #111111;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      line-height: 1;
    }

    .text-btn:disabled {
      color: var(--muted);
      cursor: default;
    }

    .query-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 0;
      gap: 8px;
      width: 100%;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 4px;
    }

    .chip {
      padding: 0;
      font-size: 12px;
      line-height: 1;
      border: 0;
      background: transparent;
      color: var(--muted);
      white-space: nowrap;
    }

    .chip.hit {
      color: #0b4a3f;
      font-weight: 600;
    }

    .chip.running {
      color: #374151;
      font-weight: 500;
    }

    .chip.failed {
      color: #991b1b;
      font-weight: 500;
    }

    .ghost-btn,
    .primary-btn {
      width: 100%;
      padding: 9px 10px;
      border: 1px solid var(--line-strong);
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
      font-size: 12px;
      background: #fff;
      color: var(--text);
    }

    .ghost-btn {
      margin-top: 6px;
    }

    .primary-btn {
      margin-top: 8px;
      color: #fff;
      background: var(--primary);
      border-color: var(--primary);
    }

    .secondary-btn {
      border: 1px solid #C8D0DC;
      background: #C8D0DC;
      color: #111111;
      border-radius: 4px;
      font-weight: 500;
    }

    #applyCriteriaBtn {
      width: 100%;
      padding: 9px 10px;
      font-size: 12px;
      line-height: 1;
      margin-top: 8px;
      cursor: pointer;
    }

    .hidden {
      display: none !important;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .form-row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 4px 0;
    }

    .toggle-label {
      margin: 0;
      font-size: 11px;
      color: var(--muted);
      font-weight: 500;
    }

    .switch {
      position: relative;
      width: 34px;
      height: 20px;
      flex: 0 0 auto;
      cursor: default;
    }

    .switch.switch-compact {
      width: 30px;
      height: 18px;
      margin-left: 4px;
    }

    #upcomingPanel .panel-header-left {
      align-items: center;
    }

    #upcomingPanel .auto-run-switch {
      margin-top: 0;
      margin-bottom: 0;
      transform: translateY(1px);
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .switch-slider {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: #d1d5db;
      transition: background-color 0.12s ease;
    }

    .switch-slider::before {
      content: "";
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      top: 3px;
      border-radius: 999px;
      background: #fff;
      transition: transform 0.12s ease;
    }

    .switch input:checked + .switch-slider {
      background: #111111;
    }

    .switch input:checked + .switch-slider::before {
      transform: translateX(14px);
    }

    .switch.switch-compact .switch-slider::before {
      width: 12px;
      height: 12px;
      left: 3px;
      top: 3px;
    }

    .switch.switch-compact input:checked + .switch-slider::before {
      transform: translateX(12px);
    }

    .switch input:disabled + .switch-slider {
      opacity: 1;
    }

    .switch.is-locked {
      cursor: help;
    }

    .switch.is-locked .switch-slider {
      opacity: 1;
      filter: none;
      background: #cfd5df;
    }

    .switch.is-locked input:checked + .switch-slider {
      background: #cfd5df;
    }

    .switch.is-locked .switch-slider::before {
      background: #eef2f7;
    }

    .switch.is-locked::after {
      content: attr(data-tooltip);
      position: absolute;
      right: 0;
      bottom: calc(100% + 8px);
      transform: none;
      background: rgba(17, 24, 39, 0.95);
      color: #fff;
      font-size: 11px;
      line-height: 1.3;
      padding: 6px 8px;
      border-radius: 6px;
      white-space: normal;
      width: max-content;
      max-width: 220px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.12s ease;
      z-index: 9999;
    }

    .switch.is-locked:hover::after,
    .switch.is-locked:focus-within::after {
      opacity: 1;
    }

    #upcomingPanel.auto-run-disabled .collapse-btn {
      display: none;
    }

    label {
      display: block;
      margin-bottom: 4px;
      font-size: 11px;
      color: var(--muted);
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 8px 10px;
      border: 0;
      border-radius: 2px;
      background: #f7f8fa;
      color: var(--text);
      font-size: 13px;
      outline: none;
    }

    input:focus {
      background: #f3f3f3;
    }

    .status {
      margin-top: 8px;
      min-height: 18px;
      font-size: 12px;
      color: var(--muted);
    }

    .status.ok {
      color: var(--ok);
    }

    .status.error {
      color: var(--danger);
    }

    .toast {
      position: fixed;
      bottom: 14px;
      right: 14px;
      z-index: 9999;
      min-width: 220px;
      max-width: 360px;
      padding: 10px 12px;
      border-radius: 6px;
      border: 1px solid var(--line-strong);
      background: #111111;
      color: #ffffff;
      font-size: 12px;
      opacity: 0;
      transform: translateY(-6px);
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.ok {
      background: #1f2937;
    }

    .toast.error {
      background: #7f1d1d;
      border-color: #b91c1c;
    }

    .result-meta {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .result-columns {
      display: grid;
      grid-template-columns: 1.1fr 0.8fr 0.8fr 0.8fr 0.8fr 0.8fr 0.6fr;
      gap: 8px;
      padding: 8px 4px;
      margin-bottom: 8px;
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .program-header-cell {
      position: relative;
    }

    .date-header-cell {
      position: relative;
    }

    .date-sort-toggle {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border: 0;
      background: transparent;
      color: inherit;
      font: inherit;
      font-weight: 500;
      text-transform: inherit;
      letter-spacing: inherit;
      padding: 0;
      cursor: pointer;
    }

    .date-sort-icon {
      width: 14px;
      height: 14px;
    }

    .program-filter-toggle {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border: 0;
      background: transparent;
      color: inherit;
      font: inherit;
      font-weight: 500;
      text-transform: inherit;
      letter-spacing: inherit;
      padding: 0;
      cursor: pointer;
    }

    .program-filter-icon {
      width: 14px;
      height: 14px;
    }

    .program-filter-menu {
      position: absolute;
      top: 22px;
      left: 0;
      z-index: 20;
      min-width: 190px;
      max-height: 220px;
      overflow: auto;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 6px 8px;
      display: none;
      box-shadow: 0 8px 18px rgba(17, 24, 39, 0.12);
    }

    .program-filter-menu.open {
      display: block;
    }

    .program-filter-item {
      display: grid;
      grid-template-columns: 18px 1fr;
      align-items: center;
      column-gap: 8px;
      min-height: 26px;
      font-size: 11px;
      color: var(--text);
      padding: 3px 0;
      text-transform: none;
      letter-spacing: 0;
      font-weight: 500;
      white-space: nowrap;
    }

    .program-filter-item input[type="checkbox"] {
      width: 14px;
      height: 14px;
      margin: 0;
      padding: 0;
      justify-self: center;
      align-self: center;
      border: 1px solid var(--line-strong);
      border-radius: 2px;
      background: #fff;
      accent-color: #111111;
    }

    .program-filter-item span {
      display: block;
      line-height: 1.2;
    }

    .flight-list {
      max-height: 66vh;
      overflow: auto;
      padding-right: 2px;
    }

    .flight-card {
      border: 1px solid var(--line);
      margin-top: -1px;
      padding: 10px 8px;
      background: #fff;
    }

    .flight-card:first-child {
      margin-top: 0;
      border-top-left-radius: 8px;
      border-top-right-radius: 8px;
    }

    .flight-card:last-child {
      border-bottom-left-radius: 8px;
      border-bottom-right-radius: 8px;
    }

    .flight-row {
      display: grid;
      grid-template-columns: 1.1fr 0.8fr 0.8fr 0.8fr 0.8fr 0.8fr 0.6fr;
      gap: 8px;
      align-items: center;
      font-size: 13px;
    }

    .cell-muted {
      color: var(--muted);
    }

    .cell-strong {
      font-weight: 600;
    }

    .meta-inline {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .empty {
      border: 1px dashed var(--line-strong);
      background: #fff;
      padding: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .is-collapsed {
      display: none;
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="hero">
      <h1 class="title" aria-label="PULSE - Polling Unlocks Live Seat Exposure">
        <span class="brand-acronym">PULSE</span>
        <span class="brand-expansion">Polling Unlocks Live Seat Exposure</span>
      </h1>
      <div id="apiLimitIndicator" class="api-limit-indicator">API limits remaining: --</div>
    </header>

    <section class="layout">
      <aside class="left-column">
        <section class="panel">
          <div class="panel-header">
            <div class="panel-header-left">
              <h2 class="panel-title">Past Queries</h2>
            </div>
            <button id="clearPastBtn" class="header-action-btn" type="button">CLEAR ALL</button>
          </div>
          <div class="panel-body">
            <div id="pastList" class="list">
              <div class="empty">Loading...</div>
            </div>
          </div>
        </section>

        <section class="panel" id="upcomingPanel">
          <div class="panel-header collapsible-header" data-toggle-target="upcomingBody" role="button" tabindex="0" aria-expanded="true">
            <div class="panel-header-left">
              <h2 class="panel-title">Auto Run</h2>
              <label class="switch switch-compact auto-run-switch" for="autoRunEnabledToggle" aria-label="Enable Auto Run">
                <input id="autoRunEnabledToggle" type="checkbox" checked />
                <span class="switch-slider"></span>
              </label>
            </div>
            <button class="collapse-btn" type="button" data-toggle-target="upcomingBody" aria-expanded="true" aria-label="Toggle Upcoming Queries">
              <i data-lucide="chevron-down" class="collapse-icon" aria-hidden="true"></i>
            </button>
          </div>
          <div class="panel-body" id="upcomingBody">
            <div id="upcomingList">
              <div class="empty">No next query yet.</div>
            </div>
          </div>
        </section>

        <section class="panel" id="criteriaPanel">
          <div class="panel-header collapsible-header" data-toggle-target="criteriaBody" role="button" tabindex="0" aria-expanded="true">
            <div class="panel-header-left">
              <h2 class="panel-title">Query Criteria</h2>
            </div>
            <button class="collapse-btn" type="button" data-toggle-target="criteriaBody" aria-expanded="true" aria-label="Toggle Query Criteria">
              <i data-lucide="chevron-down" class="collapse-icon" aria-hidden="true"></i>
            </button>
          </div>
          <div class="panel-body" id="criteriaBody">
            <form id="runForm">
              <div class="form-grid">
                <div>
                  <label>Origin Airports</label>
                  <input id="origin" required />
                </div>
                <div>
                  <label>Destination Airports</label>
                  <input id="destination" required />
                </div>
                <div class="form-row-2">
                  <div>
                    <label>Start Date</label>
                    <input id="startDate" type="date" required />
                  </div>
                  <div>
                    <label>End Date</label>
                    <input id="endDate" type="date" required />
                  </div>
                </div>
                <div class="form-row-2">
                  <div>
                    <label>Cabin</label>
                    <input id="cabin" value="Business" />
                  </div>
                  <div>
                    <label>Max Mileage</label>
                    <input id="maxMileage" type="text" inputmode="numeric" value="100,000" />
                  </div>
                </div>
                <div class="toggle-row">
                  <span class="toggle-label">Direct Flights Only</span>
                  <label
                    class="switch is-locked"
                    for="onlyDirectFlights"
                    data-tooltip="Locked in this release. Edit code to unlock."
                  >
                    <input id="onlyDirectFlights" type="checkbox" checked disabled />
                    <span class="switch-slider"></span>
                  </label>
                </div>
              </div>
              <button id="applyCriteriaBtn" class="secondary-btn hidden" type="button" style="margin-top:8px;">
                APPLY CRITERIA TO AUTO RUN
              </button>
              <button class="primary-btn" type="submit">OFF-CYCLE RUN</button>
            </form>
          </div>
        </section>
      </aside>

      <section class="panel result-panel">
        <div class="panel-header">
          <div class="panel-header-left">
            <h2 class="panel-title">Results of Selected Query</h2>
          </div>
        </div>
        <div class="panel-body">
          <div class="result-columns">
            <div class="date-header-cell">
              <button id="dateSortToggle" class="date-sort-toggle" type="button" aria-label="Sort by date">
                <span>Date</span>
                <i data-lucide="arrow-up-down" class="date-sort-icon" aria-hidden="true"></i>
              </button>
            </div>
            <div class="program-header-cell">
              <button id="programFilterToggle" class="program-filter-toggle" type="button" aria-haspopup="true" aria-expanded="false">
                <span>Program</span>
                <i data-lucide="list-filter" class="program-filter-icon" aria-hidden="true"></i>
              </button>
              <div id="programFilterMenu" class="program-filter-menu"></div>
            </div>
            <div>Airlines</div>
            <div>Origin</div>
            <div>Destination</div>
            <div>Mileage</div>
            <div>Seats</div>
          </div>
          <div id="flightList" class="flight-list">
            <div class="empty">No result selected.</div>
          </div>
        </div>
      </section>
    </section>
  </main>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  <script>
    const state = {
      past: [],
      upcoming: [],
      nextQuery: null,
      selectedId: null,
      availablePrograms: [],
      selectedPrograms: [],
      programMenuOpen: false,
      criteriaBaseline: null,
      dateSortOrder: "asc",
      autoRunEnabled: true,
      apiLimits: null,
    };
    let toastTimer = null;

    function numberWithComma(n) {
      return Number(n || 0).toLocaleString();
    }

    function normalizeAirportCsv(value) {
      return String(value || "")
        .split(",")
        .map((s) => s.trim())
        .filter(Boolean)
        .join(", ");
    }

    function serializeAirportCsv(value) {
      return String(value || "")
        .split(",")
        .map((s) => s.trim())
        .filter(Boolean)
        .join(",");
    }

    function formatDate(raw) {
      if (!raw) return "-";
      const d = new Date(raw);
      return Number.isNaN(d.getTime()) ? raw : d.toLocaleString();
    }

    function formatPastDate(raw) {
      if (!raw) return "-";
      const d = new Date(raw);
      if (Number.isNaN(d.getTime())) return raw;
      return d.toLocaleString([], {
        month: "numeric",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit",
        second: "2-digit",
        hour12: true,
      });
    }

    function formatNextRun(raw) {
      if (!raw) return "-";
      const d = new Date(raw);
      if (Number.isNaN(d.getTime())) return raw;
      const now = new Date();
      const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const startOfTarget = new Date(d.getFullYear(), d.getMonth(), d.getDate());
      const dayDiff = Math.round((startOfTarget - startOfToday) / 86400000);
      const hh = String(d.getHours()).padStart(2, "0");
      const mm = String(d.getMinutes()).padStart(2, "0");
      if (dayDiff === 0) return `Today ${hh}:${mm}`;
      if (dayDiff === 1) return `Tomorrow ${hh}:${mm}`;
      return `${String(d.getMonth() + 1).padStart(2, "0")}/${String(d.getDate()).padStart(2, "0")} ${hh}:${mm}`;
    }

    function formatFlightDateTime(raw) {
      if (!raw) return "-";
      // Cached search often returns date-only strings; avoid displaying fake 00:00.
      if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) return raw;
      const d = new Date(raw);
      if (Number.isNaN(d.getTime())) return raw;
      const pad = (n) => String(n).padStart(2, "0");
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function formatResetInHours(raw) {
      if (!raw) return "--";
      const d = new Date(raw);
      if (Number.isNaN(d.getTime())) return "--";
      const diffMs = d.getTime() - Date.now();
      const hours = Math.max(0, diffMs / 3600000);
      return hours >= 10 ? hours.toFixed(0) : hours.toFixed(1);
    }

    function updateApiLimitIndicator() {
      const el = document.getElementById("apiLimitIndicator");
      if (!el) return;
      const r = state.apiLimits;
      if (!r || !Number.isFinite(Number(r.limit)) || !Number.isFinite(Number(r.remaining)) || Number(r.limit) <= 0) {
        el.textContent = "API limits remaining: --";
        return;
      }
      const limit = Number(r.limit);
      const remaining = Number(r.remaining);
      const pct = Math.max(0, Math.min(100, Math.round((remaining / limit) * 100)));
      const resetIn = formatResetInHours(r.reset_at);
      el.textContent = `API limits remaining: ${pct}% [reset in ${resetIn} hours]`;
    }

    function queryParamsFromForm() {
      const cabinValue = (document.getElementById("cabin").value || "").trim();
      return {
        origin_airport: serializeAirportCsv(document.getElementById("origin").value),
        destination_airport: serializeAirportCsv(document.getElementById("destination").value),
        start_date: document.getElementById("startDate").value,
        end_date: document.getElementById("endDate").value,
        cabin: cabinValue ? cabinValue.toLowerCase() : "business",
        only_direct_flights: "true",
        order_by: "lowest_mileage",
        take: "200",
      };
    }

    function normalizeCriteria(params) {
      const p = params || {};
      return {
        origin_airport: serializeAirportCsv(p.origin_airport || ""),
        destination_airport: serializeAirportCsv(p.destination_airport || ""),
        start_date: p.start_date || "",
        end_date: p.end_date || "",
        cabin: String(p.cabin || "business").toLowerCase(),
        only_direct_flights: "true",
        order_by: p.order_by || "lowest_mileage",
        take: String(p.take || "200"),
      };
    }

    function criteriaEquals(a, b) {
      return JSON.stringify(normalizeCriteria(a)) === JSON.stringify(normalizeCriteria(b));
    }

    function updateCriteriaApplyButton() {
      const btn = document.getElementById("applyCriteriaBtn");
      if (!btn) return;
      if (!state.nextQuery || !state.criteriaBaseline) {
        btn.classList.add("hidden");
        return;
      }
      const changed = !criteriaEquals(queryParamsFromForm(), state.criteriaBaseline);
      btn.classList.toggle("hidden", !changed);
    }

    function attachCriteriaChangeWatchers() {
      const ids = ["origin", "destination", "startDate", "endDate", "cabin"];
      ids.forEach((id) => {
        const el = document.getElementById(id);
        if (!el) return;
        const evt = el.tagName === "INPUT" && el.type === "checkbox" ? "change" : "input";
        el.addEventListener(evt, updateCriteriaApplyButton);
        if (evt !== "change") {
          el.addEventListener("change", updateCriteriaApplyButton);
        }
      });
    }

    function formatCabinDisplay(value) {
      const raw = String(value || "").trim();
      if (!raw) return "Business";
      return raw.charAt(0).toUpperCase() + raw.slice(1).toLowerCase();
    }

    function sanitizeIntegerInput(el) {
      if (!el) return;
      el.value = String(el.value || "").replace(/[^\d]/g, "");
    }

    function parseIntegerString(value, fallback = 0) {
      const raw = String(value || "").replace(/[^\d]/g, "");
      if (!raw) return fallback;
      const n = Number(raw);
      return Number.isFinite(n) ? n : fallback;
    }

    function formatIntegerWithCommas(value) {
      const n = parseIntegerString(value, 0);
      return n ? n.toLocaleString() : "";
    }

    function initMaxMileageInput() {
      const el = document.getElementById("maxMileage");
      if (!el) return;
      const normalize = () => {
        el.value = formatIntegerWithCommas(el.value || "0");
      };
      el.addEventListener("input", () => {
        const before = el.selectionStart || 0;
        const rawLeft = String(el.value || "").slice(0, before).replace(/[^\d]/g, "").length;
        el.value = formatIntegerWithCommas(el.value);
        let pos = 0;
        let digitsSeen = 0;
        while (pos < el.value.length && digitsSeen < rawLeft) {
          if (/\d/.test(el.value[pos])) digitsSeen += 1;
          pos += 1;
        }
        el.setSelectionRange(pos, pos);
      });
      el.addEventListener("blur", normalize);
      normalize();
    }

    function dateSortValue(raw) {
      if (!raw) return Number.MAX_SAFE_INTEGER;
      if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) {
        const d = new Date(`${raw}T00:00:00`);
        return Number.isNaN(d.getTime()) ? Number.MAX_SAFE_INTEGER : d.getTime();
      }
      const d = new Date(raw);
      return Number.isNaN(d.getTime()) ? Number.MAX_SAFE_INTEGER : d.getTime();
    }

    function parseBooleanish(value, fallback = false) {
      if (typeof value === "boolean") return value;
      if (typeof value === "string") {
        const v = value.trim().toLowerCase();
        if (v === "true") return true;
        if (v === "false") return false;
      }
      return fallback;
    }

    function setStatus(text, type) {
      const el = document.getElementById("toast");
      el.textContent = text;
      el.className = "toast show";
      if (type) el.classList.add(type);
      if (toastTimer) {
        clearTimeout(toastTimer);
      }
      toastTimer = setTimeout(() => {
        el.classList.remove("show");
      }, 2200);
    }

    function uniquePrograms(hits) {
      const set = new Set();
      (hits || []).forEach((h) => {
        const v = (h.source || "").trim();
        if (v) set.add(v);
      });
      return Array.from(set).sort((a, b) => a.localeCompare(b));
    }

    function syncSelectedPrograms(programs, resetToAll) {
      state.availablePrograms = programs;
      if (resetToAll || !state.selectedPrograms.length) {
        state.selectedPrograms = [...programs];
        return;
      }
      state.selectedPrograms = state.selectedPrograms.filter((p) => programs.includes(p));
      if (!state.selectedPrograms.length) {
        state.selectedPrograms = [...programs];
      }
    }

    function renderProgramFilterMenu() {
      const menu = document.getElementById("programFilterMenu");
      const toggle = document.getElementById("programFilterToggle");
      if (!menu || !toggle) return;

      if (!state.availablePrograms.length) {
        menu.classList.remove("open");
        menu.innerHTML = "";
        toggle.setAttribute("aria-expanded", "false");
        return;
      }

      const allChecked = state.selectedPrograms.length === state.availablePrograms.length;
      const items = [
        `<label class="program-filter-item"><input type="checkbox" id="programFilterAll" ${allChecked ? "checked" : ""}><span>All Programs</span></label>`,
        ...state.availablePrograms.map(
          (p) =>
            `<label class="program-filter-item"><input type="checkbox" class="programFilterItem" value="${p}" ${
              state.selectedPrograms.includes(p) ? "checked" : ""
            }><span>${p}</span></label>`
        ),
      ].join("");
      menu.innerHTML = items;
      menu.classList.toggle("open", state.programMenuOpen);
      toggle.setAttribute("aria-expanded", state.programMenuOpen ? "true" : "false");

      const all = document.getElementById("programFilterAll");
      if (all) {
        all.addEventListener("change", () => {
          state.selectedPrograms = all.checked ? [...state.availablePrograms] : [];
          renderCurrentSelectedResult();
        });
      }
      menu.querySelectorAll(".programFilterItem").forEach((el) => {
        el.addEventListener("change", () => {
          const checked = Array.from(menu.querySelectorAll(".programFilterItem:checked")).map((x) => x.value);
          state.selectedPrograms = checked;
          renderCurrentSelectedResult();
        });
      });
    }

    function getSelectedRecord() {
      if (!state.selectedId) return null;
      return state.past.find((q) => q.id === state.selectedId) || null;
    }

    function renderCurrentSelectedResult() {
      renderFlightCards(getSelectedRecord());
      renderPast();
    }

    function syncAutoRunSectionUI() {
      const panel = document.getElementById("upcomingPanel");
      const body = document.getElementById("upcomingBody");
      const header = panel ? panel.querySelector(".panel-header") : null;
      const btn = panel ? panel.querySelector('.collapse-btn[data-toggle-target="upcomingBody"]') : null;
      const toggle = document.getElementById("autoRunEnabledToggle");
      if (!panel || !body || !header) return;
      const wasDisabled = panel.classList.contains("auto-run-disabled");

      if (toggle) {
        toggle.checked = !!state.autoRunEnabled;
        toggle.disabled = !state.nextQuery;
      }

      if (!state.autoRunEnabled) {
        body.classList.add("is-collapsed");
        panel.classList.add("is-panel-collapsed");
        panel.classList.add("auto-run-disabled");
        header.setAttribute("aria-expanded", "false");
        if (btn) btn.setAttribute("aria-expanded", "false");
      } else {
        panel.classList.remove("auto-run-disabled");
        if (wasDisabled) {
          body.classList.remove("is-collapsed");
          panel.classList.remove("is-panel-collapsed");
        }
        const expanded = body.classList.contains("is-collapsed") ? "false" : "true";
        header.setAttribute("aria-expanded", expanded);
        if (btn) btn.setAttribute("aria-expanded", expanded);
      }
    }

    function renderFlightCards(record) {
      const flightList = document.getElementById("flightList");

      if (!record) {
        state.availablePrograms = [];
        state.selectedPrograms = [];
        renderProgramFilterMenu();
        flightList.innerHTML = '<div class="empty">No result selected.</div>';
        return;
      }

      if (record.is_running) {
        state.availablePrograms = [];
        state.selectedPrograms = [];
        renderProgramFilterMenu();
        flightList.innerHTML = '<div class="empty">Running query...</div>';
        return;
      }

      if (record.is_failed) {
        state.availablePrograms = [];
        state.selectedPrograms = [];
        renderProgramFilterMenu();
        flightList.innerHTML = `<div class="empty">Run failed: ${record.error_message || "Unknown error"}</div>`;
        return;
      }

      syncSelectedPrograms(uniquePrograms(record.hits || []), false);
      renderProgramFilterMenu();

      const filteredHits = (record.hits || []).filter((h) => {
        if (!state.availablePrograms.length) return true;
        const source = (h.source || "").trim();
        return state.selectedPrograms.includes(source);
      });

      if (!filteredHits.length) {
        flightList.innerHTML = '<div class="empty">No matching flight under your mileage limit.</div>';
        return;
      }

      const sortedHits = [...filteredHits].sort((a, b) => {
        const av = dateSortValue(a.date);
        const bv = dateSortValue(b.date);
        return state.dateSortOrder === "asc" ? av - bv : bv - av;
      });

      flightList.innerHTML = sortedHits
        .map((h) => `
            <article class="flight-card">
              <div class="flight-row">
                <div class="cell-muted">${formatFlightDateTime(h.date)}</div>
                <div>${h.source || "-"}</div>
                <div>${h.airlines || h.flight_numbers || "-"}</div>
                <div class="cell-strong">${h.origin || "-"}</div>
                <div class="cell-strong">${h.destination || "-"}</div>
                <div>${numberWithComma(h.mileage)}</div>
                <div>${h.seats ?? "-"}</div>
              </div>
            </article>
          `)
        .join("");
    }

    function renderPast() {
      const root = document.getElementById("pastList");
      if (!state.past.length) {
        root.innerHTML = '<div class="empty">No query has run yet.</div>';
        return;
      }
      root.innerHTML = state.past
        .map((q) => {
          const selected = state.selectedId === q.id ? "selected" : "";
          const statusText = q.is_running
            ? `<span class="chip running">running...</span>`
            : q.is_failed
            ? `<span class="chip failed">failed</span>`
            : `<span class="chip hit">${q.total_hits} hits</span>`;
          const deleteBtn = q.is_running
            ? ""
            : `<button class="delete-past-btn" type="button" data-id="${q.id}" aria-label="Delete past query">
                <i data-lucide="trash-2" class="trash-icon" aria-hidden="true"></i>
              </button>`;
          return `
            <div class="query-item ${selected}" data-id="${q.id}">
              <div class="query-meta">
                <span>${formatPastDate(q.created_at)}</span>
                ${statusText}
              </div>
              ${deleteBtn}
            </div>
          `;
        })
        .join("");
      document.querySelectorAll(".query-item[data-id]").forEach((item) => {
        item.addEventListener("click", () => {
          const id = item.dataset.id;
          if (!id) return;
          if (id.startsWith("pending-") || id.startsWith("failed-")) {
            state.selectedId = id;
            renderCurrentSelectedResult();
            return;
          }
          showResult(id);
        });
      });
      document.querySelectorAll(".delete-past-btn[data-id]").forEach((btn) => {
        btn.addEventListener("click", async (e) => {
          e.stopPropagation();
          const id = btn.getAttribute("data-id");
          if (!id) return;
          const res = await fetch("/api/query/delete", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ id }),
          });
          const data = await res.json();
          if (data.error) {
            setStatus(`Delete error: ${data.error}`, "error");
            return;
          }
          state.past = state.past.filter((q) => q.id !== id);
          if (state.selectedId === id) {
            state.selectedId = state.past.length ? state.past[0].id : null;
            state.selectedPrograms = [];
            state.availablePrograms = [];
          }
          renderPast();
          if (state.selectedId) {
            renderFlightCards(getSelectedRecord());
          } else {
            renderFlightCards(null);
          }
          setStatus("Past query deleted.", "ok");
        });
      });
      if (window.lucide && typeof window.lucide.createIcons === "function") {
        window.lucide.createIcons();
      }
    }

    function renderUpcoming() {
      const root = document.getElementById("upcomingList");
      const q = state.nextQuery;
      const intervalValue = q?.interval_minutes ?? 60;
      const nextRunText = q?.next_run_at ? formatNextRun(q.next_run_at) : "-";
      root.innerHTML = `
        <div class="next-query-wrap">
          <div class="next-query-row">
            <span>Next Run</span>
            <span class="next-query-time">${nextRunText}</span>
          </div>
          <div class="next-query-control">
            <span class="next-query-label">Running every</span>
            <input class="next-query-input" id="nextQueryInterval" type="text" inputmode="numeric" pattern="[0-9]*" value="${intervalValue}" />
            <span class="next-query-label">minutes</span>
            <span class="next-query-spacer" aria-hidden="true"></span>
            <button id="confirmNextQueryBtn" class="text-btn inline-apply" type="button" disabled>SAVE</button>
          </div>
        </div>
      `;

      const confirmBtn = document.getElementById("confirmNextQueryBtn");
      const intervalInput = document.getElementById("nextQueryInterval");
      if (confirmBtn && intervalInput) {
        const baselineInterval = Number(intervalValue);
        const syncApplyState = () => {
          sanitizeIntegerInput(intervalInput);
          const val = Number(intervalInput.value);
          const valid = /^\d+$/.test(intervalInput.value) && Number.isFinite(val) && val > 0;
          confirmBtn.disabled = !(valid && val !== baselineInterval);
        };
        intervalInput.addEventListener("input", syncApplyState);
        intervalInput.addEventListener("change", syncApplyState);
        syncApplyState();

        confirmBtn.addEventListener("click", async () => {
          sanitizeIntegerInput(intervalInput);
          if (!/^\d+$/.test(intervalInput.value)) {
            setStatus("Interval must be numeric.", "error");
            return;
          }
          const val = Number(intervalInput.value);
          if (!Number.isFinite(val) || val <= 0) {
            setStatus("Interval must be greater than 0.", "error");
            return;
          }
          if (val === baselineInterval) {
            return;
          }
          await upsertNextQuery(val);
        });
      }
    }

    async function upsertNextQuery(intervalMinutes) {
      const maxMileage = parseIntegerString(document.getElementById("maxMileage").value, 100000);
      const body = {
        name: state.nextQuery?.name || "Hourly Search",
        interval_minutes: intervalMinutes,
        params: queryParamsFromForm(),
        max_mileage: maxMileage,
        enabled: state.autoRunEnabled,
      };
      const res = await fetch("/api/query/schedule", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (data.error) {
        setStatus(`Next query error: ${data.error}`, "error");
        return;
      }
      state.nextQuery = data;
      state.upcoming = data ? [data] : [];
      state.autoRunEnabled = parseBooleanish(data?.enabled, true);
      state.criteriaBaseline = normalizeCriteria(data?.params || {});
      renderUpcoming();
      syncAutoRunSectionUI();
      updateCriteriaApplyButton();
      setStatus("Next query reset.", "ok");
    }

    async function toggleAutoRunEnabled(enabled) {
      if (!state.nextQuery) return;
      const res = await fetch("/api/query/schedule/toggle", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ enabled }),
      });
      const data = await res.json();
      if (data.error) {
        setStatus(`Auto Run toggle error: ${data.error}`, "error");
        return;
      }
      state.nextQuery = data;
      state.autoRunEnabled = parseBooleanish(data.enabled, true);
      renderUpcoming();
      syncAutoRunSectionUI();
      setStatus(state.autoRunEnabled ? "Auto Run enabled." : "Auto Run disabled.", "ok");
    }

    async function applyCriteriaToNextQuery() {
      if (!state.nextQuery) return;
      const params = queryParamsFromForm();
      const res = await fetch("/api/query/schedule/update_params", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ params }),
      });
      const data = await res.json();
      if (data.error) {
        setStatus(`Apply criteria error: ${data.error}`, "error");
        return;
      }
      state.nextQuery = data;
      state.criteriaBaseline = normalizeCriteria(data.params || params);
      updateCriteriaApplyButton();
      setStatus("Next query criteria updated.", "ok");
    }

    async function showResult(id) {
      const res = await fetch(`/api/query/${id}`);
      const data = await res.json();
      if (data.error) {
        setStatus(`Error: ${data.error}`, "error");
        return;
      }
      state.selectedId = data.id;
      state.selectedPrograms = [];
      state.availablePrograms = [];
      renderCurrentSelectedResult();
    }

    async function loadState() {
      const res = await fetch("/api/state");
      const data = await res.json();
      state.past = data.past_queries || [];
      state.upcoming = data.upcoming_queries || [];
      state.nextQuery = data.next_query || state.upcoming[state.upcoming.length - 1] || null;
      state.apiLimits = data.api_limits || state.apiLimits;
      state.autoRunEnabled = parseBooleanish(state.nextQuery?.enabled, true);
      const d = state.nextQuery?.params || data.default_params || {};
      state.criteriaBaseline = normalizeCriteria(d);
      document.getElementById("origin").value = normalizeAirportCsv(d.origin_airport || "");
      document.getElementById("destination").value = normalizeAirportCsv(d.destination_airport || "");
      document.getElementById("startDate").value = d.start_date || "";
      document.getElementById("endDate").value = d.end_date || "";
      document.getElementById("cabin").value = formatCabinDisplay(d.cabin || "business");
      const initialMaxMileage = Number(state.nextQuery?.max_mileage || 100000);
      document.getElementById("maxMileage").value = numberWithComma(initialMaxMileage);
      const onlyDirect = document.getElementById("onlyDirectFlights");
      if (onlyDirect) {
        onlyDirect.checked = true;
      }
      renderPast();
      renderUpcoming();
      syncAutoRunSectionUI();
      updateApiLimitIndicator();
      updateCriteriaApplyButton();
      if (state.past.length) {
        state.selectedId = state.past[0].id;
        state.selectedPrograms = [];
        state.availablePrograms = [];
        renderCurrentSelectedResult();
      } else {
        renderFlightCards(null);
      }
    }

    function hasLocalPendingRuns() {
      return state.past.some((q) => String(q.id || "").startsWith("pending-"));
    }

    async function refreshStateSilently() {
      try {
        const res = await fetch("/api/state");
        const data = await res.json();
        if (data.error) return;

        const serverPast = data.past_queries || [];
        const localPending = state.past.filter((q) => String(q.id || "").startsWith("pending-"));
        state.past = localPending.length ? [...localPending, ...serverPast] : serverPast;
        state.upcoming = data.upcoming_queries || [];
        state.nextQuery = data.next_query || state.upcoming[state.upcoming.length - 1] || null;
        state.apiLimits = data.api_limits || state.apiLimits;
        state.autoRunEnabled = parseBooleanish(state.nextQuery?.enabled, true);

        if (state.selectedId && !state.past.some((q) => q.id === state.selectedId)) {
          state.selectedId = state.past.length ? state.past[0].id : null;
          state.selectedPrograms = [];
          state.availablePrograms = [];
        }

        renderPast();
        renderUpcoming();
        syncAutoRunSectionUI();
        updateApiLimitIndicator();
        if (state.selectedId) {
          renderFlightCards(getSelectedRecord());
        } else {
          renderFlightCards(null);
        }
      } catch (_) {
        // silent background refresh
      }
    }

    document.getElementById("runForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const params = queryParamsFromForm();
      const maxMileage = parseIntegerString(document.getElementById("maxMileage").value, 100000);
      if (!Number.isFinite(maxMileage) || maxMileage <= 0) {
        setStatus("Max Mileage must be a positive number.", "error");
        return;
      }
      const pendingId = `pending-${Date.now()}`;
      const pendingRecord = {
        id: pendingId,
        created_at: new Date().toISOString(),
        params,
        max_mileage: maxMileage,
        total_returned: 0,
        total_hits: 0,
        hits: [],
        is_running: true,
      };

      state.past.unshift(pendingRecord);
      state.selectedId = pendingId;
      state.selectedPrograms = [];
      state.availablePrograms = [];
      renderCurrentSelectedResult();

      setStatus("Running query...", "");
      const body = {
        params,
        max_mileage: maxMileage,
      };
      const res = await fetch("/api/query/run", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (data.error) {
        state.past = state.past.map((q) =>
          q.id === pendingId
            ? {
                ...q,
                id: `failed-${Date.now()}`,
                is_running: false,
                is_failed: true,
                error_message: data.error,
              }
            : q
        );
        if (state.selectedId === pendingId) {
          const failed = state.past.find((q) => q.is_failed && q.error_message === data.error);
          if (failed) {
            state.selectedId = failed.id;
          }
        }
        renderCurrentSelectedResult();
        setStatus(`Error: ${data.error}`, "error");
        return;
      }
      state.past = state.past.map((q) => (q.id === pendingId ? data : q));
      state.apiLimits = data.api_limits || state.apiLimits;
      updateApiLimitIndicator();
      setStatus(`Done. ${data.total_hits} matching flights found.`, "ok");
      state.selectedId = data.id;
      state.selectedPrograms = [];
      state.availablePrograms = [];
      renderCurrentSelectedResult();
    });

    document.getElementById("applyCriteriaBtn").addEventListener("click", async () => {
      await applyCriteriaToNextQuery();
    });

    document.getElementById("clearPastBtn").addEventListener("click", async () => {
      if (!state.past.length) return;
      const res = await fetch("/api/query/clear", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({}),
      });
      const data = await res.json();
      if (data.error) {
        setStatus(`Clear error: ${data.error}`, "error");
        return;
      }
      state.past = [];
      state.selectedId = null;
      state.selectedPrograms = [];
      state.availablePrograms = [];
      renderPast();
      renderFlightCards(null);
      setStatus("All past queries cleared.", "ok");
    });

    document.getElementById("autoRunEnabledToggle").addEventListener("click", (e) => {
      e.stopPropagation();
    });

    document.getElementById("autoRunEnabledToggle").addEventListener("change", async (e) => {
      const checked = !!e.target.checked;
      await toggleAutoRunEnabled(checked);
    });

    document.getElementById("programFilterToggle").addEventListener("click", (e) => {
      e.stopPropagation();
      state.programMenuOpen = !state.programMenuOpen;
      renderProgramFilterMenu();
    });

    document.getElementById("dateSortToggle").addEventListener("click", () => {
      state.dateSortOrder = state.dateSortOrder === "asc" ? "desc" : "asc";
      renderCurrentSelectedResult();
    });

    document.addEventListener("click", (e) => {
      const menu = document.getElementById("programFilterMenu");
      const toggle = document.getElementById("programFilterToggle");
      if (!menu || !toggle) return;
      const target = e.target;
      if (menu.contains(target) || toggle.contains(target)) return;
      if (!state.programMenuOpen) return;
      state.programMenuOpen = false;
      renderProgramFilterMenu();
    });

    function togglePanelByTarget(targetId) {
      const body = document.getElementById(targetId);
      if (!body) return;
      if (targetId === "upcomingBody" && !state.autoRunEnabled) {
        return;
      }
      const panel = body.closest(".panel");
      const willCollapse = !body.classList.contains("is-collapsed");
      body.classList.toggle("is-collapsed", willCollapse);
      if (panel) {
        panel.classList.toggle("is-panel-collapsed", willCollapse);
      }
      const expanded = willCollapse ? "false" : "true";
      const btn = document.querySelector(`.collapse-btn[data-toggle-target="${targetId}"]`);
      if (btn) btn.setAttribute("aria-expanded", expanded);
      const header = document.querySelector(`.panel-header[data-toggle-target="${targetId}"]`);
      if (header) header.setAttribute("aria-expanded", expanded);
    }

    document.querySelectorAll(".collapse-btn").forEach((btn) => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        const targetId = btn.getAttribute("data-toggle-target");
        if (!targetId) return;
        togglePanelByTarget(targetId);
      });
    });

    document.querySelectorAll(".panel-header.collapsible-header[data-toggle-target]").forEach((header) => {
      header.addEventListener("click", () => {
        const targetId = header.getAttribute("data-toggle-target");
        if (!targetId) return;
        togglePanelByTarget(targetId);
      });
      header.addEventListener("keydown", (e) => {
        if (e.key !== "Enter" && e.key !== " ") return;
        e.preventDefault();
        const targetId = header.getAttribute("data-toggle-target");
        if (!targetId) return;
        togglePanelByTarget(targetId);
      });
    });

    if (window.lucide && typeof window.lucide.createIcons === "function") {
      window.lucide.createIcons();
    }

    initMaxMileageInput();
    attachCriteriaChangeWatchers();
    loadState();
    setInterval(refreshStateSilently, 20000);
  </script>
</body>
</html>
