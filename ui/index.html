<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RewardsTicket Dashboard</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #d9dde4;
      --line-strong: #bfc6d1;
      --primary: #111111;
      --secondary-fill: #9ca3af;
      --ok: #059669;
      --danger: #dc2626;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "SF Pro Display", "SF Pro Text", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    body {
      padding: 0;
    }

    .shell {
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .hero {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    /* Specific override: main.shell > header.hero */
    main.shell > header.hero {
      padding-left: 14px;
      padding-right: 14px;
    }

    .title {
      margin: 0;
      font-size: 28px;
      letter-spacing: -0.02em;
      font-weight: 700;
    }

    .subtitle {
      display: none;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      flex: 1;
      min-height: 0;
      align-items: stretch;
    }

    .left-column {
      display: grid;
      grid-template-rows: auto auto 1fr;
      width: 320px;
      border-right: 1px solid var(--line);
      min-height: 100%;
    }

    .panel {
      background: #fff;
      border-bottom: 1px solid var(--line);
    }

    .left-column .panel:last-child {
      border-bottom: 0;
    }

    .panel.is-panel-collapsed {
      border-bottom: 0;
    }

    .result-panel {
      border-bottom: 0;
      min-height: 100%;
      display: flex;
      flex-direction: column;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--line);
      padding: 10px 12px;
    }

    .panel-header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-title {
      margin: 0;
      font-size: 14px;
      font-weight: 600;
    }

    .panel-sub {
      font-size: 11px;
      color: var(--muted);
    }

    .collapse-btn {
      width: 20px;
      height: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      line-height: 1;
      padding: 0;
      cursor: pointer;
    }

    .collapse-btn:hover {
      color: var(--text);
    }

    .collapse-btn .collapse-icon {
      width: 14px;
      height: 14px;
      transition: transform 0.12s ease;
      transform: rotate(0deg);
    }

    .collapse-btn[aria-expanded="false"] .collapse-icon {
      transform: rotate(-90deg);
    }

    .panel-body {
      padding: 10px;
    }

    /* Element 1: Past Queries header */
    main.shell > section.layout > aside.left-column > section.panel:first-child > div.panel-header {
      padding-left: 14px;
      padding-right: 14px;
    }

    /* Element 2: Past Queries body */
    main.shell > section.layout > aside.left-column > section.panel:first-child > div.panel-body {
      padding-top: 12px;
      padding-bottom: 12px;
    }

    /* Element 3: Next Query header */
    section#upcomingPanel > div.panel-header {
      padding-left: 14px;
      padding-right: 14px;
    }

    /* Element 4: Query Criteria header */
    section#criteriaPanel > div.panel-header {
      padding-left: 14px;
      padding-right: 14px;
    }

    /* Element 5: Query Criteria body */
    div#criteriaBody {
      padding-left: 14px;
      padding-right: 14px;
      padding-top: 14px;
      padding-bottom: 14px;
    }

    /* Specific override: Upcoming body left/right padding */
    div#upcomingBody {
      padding-left: 14px;
      padding-right: 14px;
    }

    /* Element 6: Results panel body */
    main.shell > section.layout > section.panel > div.panel-body {
      padding-left: 14px;
      padding-right: 14px;
    }

    /* Element 7: Results panel header */
    main.shell > section.layout > section.panel > div.panel-header {
      padding-left: 14px;
      padding-right: 14px;
    }

    .list {
      max-height: 220px;
      overflow: auto;
      padding-right: 2px;
    }

    .query-item {
      border-bottom: 0;
      padding: 8px 32px 8px 4px;
      background: #fff;
      cursor: pointer;
      transition: background-color 0.12s ease;
      position: relative;
      border-radius: 4px;
      margin-bottom: 6px;
    }

    .query-item.selected {
      background: #f3f4f6;
    }

    .query-item:hover {
      background: #f8f8f8;
    }

    .query-item.selected .query-meta {
      color: #111111;
      font-weight: 600;
    }

    .query-item.selected .chip {
      color: #111111;
    }

    .query-check {
      width: 16px;
      height: 16px;
      border-radius: 999px;
      border: 1.5px solid var(--line-strong);
      background: #fff;
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
    }

    .next-query-wrap {
      display: grid;
      gap: 8px;
    }

    .next-query-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--muted);
      padding-bottom: 0;
    }

    .next-query-time {
      color: var(--text);
      font-weight: 600;
    }

    .next-query-control {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .next-query-spacer {
      margin-left: auto;
      width: 1px;
      height: 1px;
    }

    .next-query-label {
      margin: 0;
      font-size: 12px;
      color: var(--muted);
      font-weight: 400;
      white-space: nowrap;
    }

    .next-query-input {
      width: 56px;
    }

    .inline-apply {
      width: auto;
      min-width: 0;
      padding: 0;
      margin-top: 0;
    }

    .text-btn {
      border: 0;
      background: transparent;
      color: #111111;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      line-height: 1;
    }

    .text-btn:disabled {
      color: var(--muted);
      cursor: default;
    }

    .query-item.selected .query-check {
      border-color: #111111;
      background: #111111;
    }

    .query-item.selected .query-check::after {
      content: "✓";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -58%);
      font-size: 11px;
      line-height: 1;
      color: #ffffff;
      font-weight: 700;
    }

    .query-meta {
      display: flex;
      justify-content: flex-start;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
      gap: 8px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 4px;
    }

    .chip {
      padding: 0;
      font-size: 10px;
      line-height: 1;
      border: 0;
      background: transparent;
      color: var(--muted);
    }

    .chip.hit {
      color: #0b4a3f;
      font-weight: 600;
    }

    .ghost-btn,
    .primary-btn {
      width: 100%;
      padding: 9px 10px;
      border: 1px solid var(--line-strong);
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
      font-size: 12px;
      background: #fff;
      color: var(--text);
    }

    .ghost-btn {
      margin-top: 6px;
    }

    .primary-btn {
      margin-top: 8px;
      color: #fff;
      background: var(--primary);
      border-color: var(--primary);
    }

    .secondary-btn {
      border: 1px solid #C8D0DC;
      background: #C8D0DC;
      color: #111111;
      border-radius: 4px;
      font-weight: 500;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .form-row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 4px 0;
    }

    .toggle-label {
      margin: 0;
      font-size: 11px;
      color: var(--muted);
      font-weight: 500;
    }

    .switch {
      position: relative;
      width: 34px;
      height: 20px;
      flex: 0 0 auto;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .switch-slider {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: #d1d5db;
      transition: background-color 0.12s ease;
    }

    .switch-slider::before {
      content: "";
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      top: 3px;
      border-radius: 999px;
      background: #fff;
      transition: transform 0.12s ease;
    }

    .switch input:checked + .switch-slider {
      background: #111111;
    }

    .switch input:checked + .switch-slider::before {
      transform: translateX(14px);
    }

    label {
      display: block;
      margin-bottom: 4px;
      font-size: 11px;
      color: var(--muted);
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 8px 10px;
      border: 0;
      border-radius: 2px;
      background: #f7f8fa;
      color: var(--text);
      font-size: 13px;
      outline: none;
    }

    input:focus {
      background: #f3f3f3;
    }

    .status {
      margin-top: 8px;
      min-height: 18px;
      font-size: 12px;
      color: var(--muted);
    }

    .status.ok {
      color: var(--ok);
    }

    .status.error {
      color: var(--danger);
    }

    .toast {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 9999;
      min-width: 220px;
      max-width: 360px;
      padding: 10px 12px;
      border-radius: 6px;
      border: 1px solid var(--line-strong);
      background: #111111;
      color: #ffffff;
      font-size: 12px;
      opacity: 0;
      transform: translateY(-6px);
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.ok {
      background: #1f2937;
    }

    .toast.error {
      background: #7f1d1d;
      border-color: #b91c1c;
    }

    .result-meta {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .result-columns {
      display: grid;
      grid-template-columns: 1.1fr 0.8fr 0.8fr 0.8fr 0.8fr 0.8fr 0.6fr;
      gap: 8px;
      padding: 8px 4px;
      margin-bottom: 8px;
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .program-header-cell {
      position: relative;
    }

    .program-filter-toggle {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border: 0;
      background: transparent;
      color: inherit;
      font: inherit;
      font-weight: 500;
      text-transform: inherit;
      letter-spacing: inherit;
      padding: 0;
      cursor: pointer;
    }

    .program-filter-icon {
      width: 14px;
      height: 14px;
    }

    .program-filter-menu {
      position: absolute;
      top: 22px;
      left: 0;
      z-index: 20;
      min-width: 190px;
      max-height: 220px;
      overflow: auto;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 6px 8px;
      display: none;
      box-shadow: 0 8px 18px rgba(17, 24, 39, 0.12);
    }

    .program-filter-menu.open {
      display: block;
    }

    .program-filter-item {
      display: grid;
      grid-template-columns: 18px 1fr;
      align-items: center;
      column-gap: 8px;
      min-height: 26px;
      font-size: 11px;
      color: var(--text);
      padding: 3px 0;
      text-transform: none;
      letter-spacing: 0;
      font-weight: 500;
      white-space: nowrap;
    }

    .program-filter-item input[type="checkbox"] {
      width: 14px;
      height: 14px;
      margin: 0;
      padding: 0;
      justify-self: center;
      align-self: center;
      border: 1px solid var(--line-strong);
      border-radius: 2px;
      background: #fff;
      accent-color: #111111;
    }

    .program-filter-item span {
      display: block;
      line-height: 1.2;
    }

    .flight-list {
      max-height: 66vh;
      overflow: auto;
      padding-right: 2px;
    }

    .flight-card {
      border: 1px solid var(--line);
      margin-top: -1px;
      padding: 10px 8px;
      background: #fff;
    }

    .flight-card:first-child {
      margin-top: 0;
      border-top-left-radius: 8px;
      border-top-right-radius: 8px;
    }

    .flight-card:last-child {
      border-bottom-left-radius: 8px;
      border-bottom-right-radius: 8px;
    }

    .flight-row {
      display: grid;
      grid-template-columns: 1.1fr 0.8fr 0.8fr 0.8fr 0.8fr 0.8fr 0.6fr;
      gap: 8px;
      align-items: center;
      font-size: 13px;
    }

    .cell-muted {
      color: var(--muted);
    }

    .cell-strong {
      font-weight: 600;
    }

    .meta-inline {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .empty {
      border: 1px dashed var(--line-strong);
      background: #fff;
      padding: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .is-collapsed {
      display: none;
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="hero">
      <h1 class="title">RewardsTicket</h1>
    </header>

    <section class="layout">
      <aside class="left-column">
        <section class="panel">
          <div class="panel-header">
            <div class="panel-header-left">
              <h2 class="panel-title">Past Queries</h2>
            </div>
          </div>
          <div class="panel-body">
            <div id="pastList" class="list">
              <div class="empty">Loading...</div>
            </div>
          </div>
        </section>

        <section class="panel" id="upcomingPanel">
          <div class="panel-header">
            <div class="panel-header-left">
              <h2 class="panel-title">Next Query</h2>
            </div>
            <button class="collapse-btn" type="button" data-toggle-target="upcomingBody" aria-expanded="true" aria-label="Toggle Upcoming Queries">
              <i data-lucide="chevron-down" class="collapse-icon" aria-hidden="true"></i>
            </button>
          </div>
          <div class="panel-body" id="upcomingBody">
            <div id="upcomingList">
              <div class="empty">No next query yet.</div>
            </div>
          </div>
        </section>

        <section class="panel" id="criteriaPanel">
          <div class="panel-header">
            <div class="panel-header-left">
              <h2 class="panel-title">Query Criteria</h2>
            </div>
            <button class="collapse-btn" type="button" data-toggle-target="criteriaBody" aria-expanded="true" aria-label="Toggle Query Criteria">
              <i data-lucide="chevron-down" class="collapse-icon" aria-hidden="true"></i>
            </button>
          </div>
          <div class="panel-body" id="criteriaBody">
            <form id="runForm">
              <div class="form-grid">
                <div>
                  <label>Origin Airports</label>
                  <input id="origin" required />
                </div>
                <div>
                  <label>Destination Airports</label>
                  <input id="destination" required />
                </div>
                <div class="form-row-2">
                  <div>
                    <label>Start Date</label>
                    <input id="startDate" type="date" required />
                  </div>
                  <div>
                    <label>End Date</label>
                    <input id="endDate" type="date" required />
                  </div>
                </div>
                <div class="form-row-2">
                  <div>
                    <label>Cabin</label>
                    <input id="cabin" value="Business" />
                  </div>
                  <div>
                    <label>Max Mileage</label>
                    <input id="maxMileage" type="number" value="100000" />
                  </div>
                </div>
                <div class="toggle-row">
                  <span class="toggle-label">Direct Flights Only</span>
                  <label class="switch" for="onlyDirectFlights">
                    <input id="onlyDirectFlights" type="checkbox" checked />
                    <span class="switch-slider"></span>
                  </label>
                </div>
              </div>
              <button class="primary-btn" type="submit">Off-cycle Run</button>
            </form>
          </div>
        </section>
      </aside>

      <section class="panel result-panel">
        <div class="panel-header">
          <div class="panel-header-left">
            <h2 class="panel-title">Results of Selected Query</h2>
          </div>
        </div>
        <div class="panel-body">
          <div class="result-columns">
            <div>Date</div>
            <div class="program-header-cell">
              <button id="programFilterToggle" class="program-filter-toggle" type="button" aria-haspopup="true" aria-expanded="false">
                <span>Program</span>
                <i data-lucide="list-filter" class="program-filter-icon" aria-hidden="true"></i>
              </button>
              <div id="programFilterMenu" class="program-filter-menu"></div>
            </div>
            <div>Airlines</div>
            <div>Origin</div>
            <div>Destination</div>
            <div>Mileage</div>
            <div>Seats</div>
          </div>
          <div id="flightList" class="flight-list">
            <div class="empty">No result selected.</div>
          </div>
        </div>
      </section>
    </section>
  </main>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  <script>
    const state = {
      past: [],
      upcoming: [],
      nextQuery: null,
      selectedId: null,
      availablePrograms: [],
      selectedPrograms: [],
      programMenuOpen: false,
    };
    let toastTimer = null;

    function numberWithComma(n) {
      return Number(n || 0).toLocaleString();
    }

    function normalizeAirportCsv(value) {
      return String(value || "")
        .split(",")
        .map((s) => s.trim())
        .filter(Boolean)
        .join(", ");
    }

    function serializeAirportCsv(value) {
      return String(value || "")
        .split(",")
        .map((s) => s.trim())
        .filter(Boolean)
        .join(",");
    }

    function formatDate(raw) {
      if (!raw) return "-";
      const d = new Date(raw);
      return Number.isNaN(d.getTime()) ? raw : d.toLocaleString();
    }

    function formatNextRun(raw) {
      if (!raw) return "-";
      const d = new Date(raw);
      if (Number.isNaN(d.getTime())) return raw;
      const now = new Date();
      const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const startOfTarget = new Date(d.getFullYear(), d.getMonth(), d.getDate());
      const dayDiff = Math.round((startOfTarget - startOfToday) / 86400000);
      const hh = String(d.getHours()).padStart(2, "0");
      const mm = String(d.getMinutes()).padStart(2, "0");
      if (dayDiff === 0) return `Today ${hh}:${mm}`;
      if (dayDiff === 1) return `Tomorrow ${hh}:${mm}`;
      return `${String(d.getMonth() + 1).padStart(2, "0")}/${String(d.getDate()).padStart(2, "0")} ${hh}:${mm}`;
    }

    function formatFlightDateTime(raw) {
      if (!raw) return "-";
      // Cached search often returns date-only strings; avoid displaying fake 00:00.
      if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) return raw;
      const d = new Date(raw);
      if (Number.isNaN(d.getTime())) return raw;
      const pad = (n) => String(n).padStart(2, "0");
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function queryParamsFromForm() {
      const onlyDirect = document.getElementById("onlyDirectFlights");
      const cabinValue = (document.getElementById("cabin").value || "").trim();
      return {
        origin_airport: serializeAirportCsv(document.getElementById("origin").value),
        destination_airport: serializeAirportCsv(document.getElementById("destination").value),
        start_date: document.getElementById("startDate").value,
        end_date: document.getElementById("endDate").value,
        cabin: cabinValue ? cabinValue.toLowerCase() : "business",
        only_direct_flights: onlyDirect && onlyDirect.checked ? "true" : "false",
        order_by: "lowest_mileage",
        take: "200",
      };
    }

    function formatCabinDisplay(value) {
      const raw = String(value || "").trim();
      if (!raw) return "Business";
      return raw.charAt(0).toUpperCase() + raw.slice(1).toLowerCase();
    }

    function parseBooleanish(value, fallback = false) {
      if (typeof value === "boolean") return value;
      if (typeof value === "string") {
        const v = value.trim().toLowerCase();
        if (v === "true") return true;
        if (v === "false") return false;
      }
      return fallback;
    }

    function setStatus(text, type) {
      const el = document.getElementById("toast");
      el.textContent = text;
      el.className = "toast show";
      if (type) el.classList.add(type);
      if (toastTimer) {
        clearTimeout(toastTimer);
      }
      toastTimer = setTimeout(() => {
        el.classList.remove("show");
      }, 2200);
    }

    function uniquePrograms(hits) {
      const set = new Set();
      (hits || []).forEach((h) => {
        const v = (h.source || "").trim();
        if (v) set.add(v);
      });
      return Array.from(set).sort((a, b) => a.localeCompare(b));
    }

    function syncSelectedPrograms(programs, resetToAll) {
      state.availablePrograms = programs;
      if (resetToAll || !state.selectedPrograms.length) {
        state.selectedPrograms = [...programs];
        return;
      }
      state.selectedPrograms = state.selectedPrograms.filter((p) => programs.includes(p));
      if (!state.selectedPrograms.length) {
        state.selectedPrograms = [...programs];
      }
    }

    function renderProgramFilterMenu() {
      const menu = document.getElementById("programFilterMenu");
      const toggle = document.getElementById("programFilterToggle");
      if (!menu || !toggle) return;

      if (!state.availablePrograms.length) {
        menu.classList.remove("open");
        menu.innerHTML = "";
        toggle.setAttribute("aria-expanded", "false");
        return;
      }

      const allChecked = state.selectedPrograms.length === state.availablePrograms.length;
      const items = [
        `<label class="program-filter-item"><input type="checkbox" id="programFilterAll" ${allChecked ? "checked" : ""}><span>All Programs</span></label>`,
        ...state.availablePrograms.map(
          (p) =>
            `<label class="program-filter-item"><input type="checkbox" class="programFilterItem" value="${p}" ${
              state.selectedPrograms.includes(p) ? "checked" : ""
            }><span>${p}</span></label>`
        ),
      ].join("");
      menu.innerHTML = items;
      menu.classList.toggle("open", state.programMenuOpen);
      toggle.setAttribute("aria-expanded", state.programMenuOpen ? "true" : "false");

      const all = document.getElementById("programFilterAll");
      if (all) {
        all.addEventListener("change", () => {
          state.selectedPrograms = all.checked ? [...state.availablePrograms] : [];
          renderCurrentSelectedResult();
        });
      }
      menu.querySelectorAll(".programFilterItem").forEach((el) => {
        el.addEventListener("change", () => {
          const checked = Array.from(menu.querySelectorAll(".programFilterItem:checked")).map((x) => x.value);
          state.selectedPrograms = checked;
          renderCurrentSelectedResult();
        });
      });
    }

    function getSelectedRecord() {
      if (!state.selectedId) return null;
      return state.past.find((q) => q.id === state.selectedId) || null;
    }

    function renderCurrentSelectedResult() {
      renderFlightCards(getSelectedRecord());
      renderPast();
    }

    function renderFlightCards(record) {
      const flightList = document.getElementById("flightList");

      if (!record) {
        state.availablePrograms = [];
        state.selectedPrograms = [];
        renderProgramFilterMenu();
        flightList.innerHTML = '<div class="empty">No result selected.</div>';
        return;
      }

      syncSelectedPrograms(uniquePrograms(record.hits || []), false);
      renderProgramFilterMenu();

      const filteredHits = (record.hits || []).filter((h) => {
        if (!state.availablePrograms.length) return true;
        const source = (h.source || "").trim();
        return state.selectedPrograms.includes(source);
      });

      if (!filteredHits.length) {
        flightList.innerHTML = '<div class="empty">No matching flight under your mileage limit.</div>';
        return;
      }

      flightList.innerHTML = filteredHits
        .map((h) => `
            <article class="flight-card">
              <div class="flight-row">
                <div class="cell-muted">${formatFlightDateTime(h.date)}</div>
                <div>${h.source || "-"}</div>
                <div>${h.airlines || h.flight_numbers || "-"}</div>
                <div class="cell-strong">${h.origin || "-"}</div>
                <div class="cell-strong">${h.destination || "-"}</div>
                <div>${numberWithComma(h.mileage)}</div>
                <div>${h.seats ?? "-"}</div>
              </div>
            </article>
          `)
        .join("");
    }

    function renderPast() {
      const root = document.getElementById("pastList");
      if (!state.past.length) {
        root.innerHTML = '<div class="empty">No query has run yet.</div>';
        return;
      }
      root.innerHTML = state.past
        .map((q) => {
          const selected = state.selectedId === q.id ? "selected" : "";
          return `
            <div class="query-item ${selected}" data-id="${q.id}">
              <div class="query-meta">
                <span>${formatDate(q.created_at)}</span>
              </div>
              <div class="chips">
                <span class="chip hit">${q.total_hits} hits</span>
              </div>
              <span class="query-check" aria-hidden="true"></span>
            </div>
          `;
        })
        .join("");
      document.querySelectorAll(".query-item[data-id]").forEach((item) => {
        item.addEventListener("click", () => showResult(item.dataset.id));
      });
    }

    function renderUpcoming() {
      const root = document.getElementById("upcomingList");
      const q = state.nextQuery;
      const intervalValue = q?.interval_minutes ?? 60;
      const nextRunText = q?.next_run_at ? formatNextRun(q.next_run_at) : "-";
      root.innerHTML = `
        <div class="next-query-wrap">
          <div class="next-query-row">
            <span>Next Run</span>
            <span class="next-query-time">${nextRunText}</span>
          </div>
          <div class="next-query-control">
            <span class="next-query-label">Running every</span>
            <input class="next-query-input" id="nextQueryInterval" type="number" value="${intervalValue}" min="1" />
            <span class="next-query-label">minutes</span>
            <span class="next-query-spacer" aria-hidden="true"></span>
            <button id="confirmNextQueryBtn" class="text-btn inline-apply" type="button" disabled>Re-apply</button>
          </div>
        </div>
      `;

      const confirmBtn = document.getElementById("confirmNextQueryBtn");
      const intervalInput = document.getElementById("nextQueryInterval");
      if (confirmBtn && intervalInput) {
        const baselineInterval = Number(intervalValue);
        const syncApplyState = () => {
          const val = Number(intervalInput.value);
          const valid = Number.isFinite(val) && val > 0;
          confirmBtn.disabled = !(valid && val !== baselineInterval);
        };
        intervalInput.addEventListener("input", syncApplyState);
        intervalInput.addEventListener("change", syncApplyState);
        syncApplyState();

        confirmBtn.addEventListener("click", async () => {
          const val = Number(intervalInput.value || 60);
          if (!Number.isFinite(val) || val <= 0) {
            setStatus("Interval must be greater than 0.", "error");
            return;
          }
          if (val === baselineInterval) {
            return;
          }
          await upsertNextQuery(val);
        });
      }
    }

    async function upsertNextQuery(intervalMinutes) {
      const body = {
        name: state.nextQuery?.name || "Hourly Search",
        interval_minutes: intervalMinutes,
        params: queryParamsFromForm(),
      };
      const res = await fetch("/api/query/schedule", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (data.error) {
        setStatus(`Next query error: ${data.error}`, "error");
        return;
      }
      state.nextQuery = data;
      state.upcoming = data ? [data] : [];
      renderUpcoming();
      setStatus("Next query reset.", "ok");
    }

    async function showResult(id) {
      const res = await fetch(`/api/query/${id}`);
      const data = await res.json();
      if (data.error) {
        setStatus(`Error: ${data.error}`, "error");
        return;
      }
      state.selectedId = data.id;
      state.selectedPrograms = [];
      state.availablePrograms = [];
      renderCurrentSelectedResult();
    }

    async function loadState() {
      const res = await fetch("/api/state");
      const data = await res.json();
      state.past = data.past_queries || [];
      state.upcoming = data.upcoming_queries || [];
      state.nextQuery = data.next_query || state.upcoming[state.upcoming.length - 1] || null;
      const d = data.default_params || {};
      document.getElementById("origin").value = normalizeAirportCsv(d.origin_airport || "");
      document.getElementById("destination").value = normalizeAirportCsv(d.destination_airport || "");
      document.getElementById("startDate").value = d.start_date || "";
      document.getElementById("endDate").value = d.end_date || "";
      document.getElementById("cabin").value = formatCabinDisplay(d.cabin || "business");
      const onlyDirect = document.getElementById("onlyDirectFlights");
      if (onlyDirect) {
        onlyDirect.checked = parseBooleanish(d.only_direct_flights, true);
      }
      renderPast();
      renderUpcoming();
      if (state.past.length) {
        state.selectedId = state.past[0].id;
        state.selectedPrograms = [];
        state.availablePrograms = [];
        renderCurrentSelectedResult();
      } else {
        renderFlightCards(null);
      }
    }

    document.getElementById("runForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      setStatus("Running query...", "");
      const body = {
        params: queryParamsFromForm(),
        max_mileage: Number(document.getElementById("maxMileage").value || 100000),
      };
      const res = await fetch("/api/query/run", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (data.error) {
        setStatus(`Error: ${data.error}`, "error");
        return;
      }
      setStatus(`Done. ${data.total_hits} matching flights found.`, "ok");
      state.selectedId = data.id;
      state.past.unshift(data);
      state.selectedPrograms = [];
      state.availablePrograms = [];
      renderCurrentSelectedResult();
    });

    document.getElementById("programFilterToggle").addEventListener("click", (e) => {
      e.stopPropagation();
      state.programMenuOpen = !state.programMenuOpen;
      renderProgramFilterMenu();
    });

    document.addEventListener("click", (e) => {
      const menu = document.getElementById("programFilterMenu");
      const toggle = document.getElementById("programFilterToggle");
      if (!menu || !toggle) return;
      const target = e.target;
      if (menu.contains(target) || toggle.contains(target)) return;
      if (!state.programMenuOpen) return;
      state.programMenuOpen = false;
      renderProgramFilterMenu();
    });

    document.querySelectorAll(".collapse-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        const targetId = btn.getAttribute("data-toggle-target");
        const body = document.getElementById(targetId);
        const panel = btn.closest(".panel");
        if (!body) return;
        const willCollapse = !body.classList.contains("is-collapsed");
        body.classList.toggle("is-collapsed", willCollapse);
        if (panel) {
          panel.classList.toggle("is-panel-collapsed", willCollapse);
        }
        btn.setAttribute("aria-expanded", willCollapse ? "false" : "true");
      });
    });

    if (window.lucide && typeof window.lucide.createIcons === "function") {
      window.lucide.createIcons();
    }

    loadState();
  </script>
</body>
</html>
